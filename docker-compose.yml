version: '3.8'
services:
  app:
    build: .
    container_name: estatement_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html:ro
    networks:
      - est_net

  web:
    image: nginx:stable
    container_name: estatement_web
    depends_on:
      - app
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - est_net

networks:
  est_net:
    driver: bridge
